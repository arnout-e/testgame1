<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a2e;
      color: #eee;
    }
    .container { text-align: center; }
    h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .status {
      font-size: 1.3rem;
      margin-bottom: 1rem;
      min-height: 2rem;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(3, 120px);
      grid-template-rows: repeat(3, 120px);
      gap: 8px;
      justify-content: center;
      margin-bottom: 1.5rem;
    }
    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      color: #eee;
    }
    .cell:hover:not(.taken) {
      background: #1a3a6a;
      transform: scale(1.05);
    }
    .cell.x { color: #e94560; }
    .cell.o { color: #0ea5e9; }
    .cell.win { background: #0f3460; animation: pulse 0.6s ease-in-out infinite alternate; }
    @keyframes pulse { to { background: #1a5276; } }
    button.reset {
      padding: 0.7rem 2rem;
      font-size: 1.1rem;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
    }
    button.reset:hover { background: #c0392b; }
    .score {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 1rem;
      font-size: 1.1rem;
    }
    .score span { font-weight: bold; }
    .score .x-score { color: #e94560; }
    .score .o-score { color: #0ea5e9; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Tic Tac Toe</h1>
    <div class="score">
      <div>X: <span class="x-score">0</span></div>
      <div>Gelijk: <span class="d-score">0</span></div>
      <div>O: <span class="o-score">0</span></div>
    </div>
    <div class="status">X begint</div>
    <div class="board"></div>
    <button class="reset">Nieuw spel</button>
  </div>
  <script>
    const board = document.querySelector('.board');
    const status = document.querySelector('.status');
    const resetBtn = document.querySelector('.reset');
    const xScoreEl = document.querySelector('.x-score');
    const oScoreEl = document.querySelector('.o-score');
    const dScoreEl = document.querySelector('.d-score');

    const wins = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let cells, current, gameOver, score = { x: 0, o: 0, d: 0 };

    function init() {
      board.innerHTML = '';
      cells = Array.from({ length: 9 }, (_, i) => {
        const cell = document.createElement('button');
        cell.className = 'cell';
        cell.dataset.index = i;
        cell.addEventListener('click', handleClick);
        board.appendChild(cell);
        return cell;
      });
      current = 'X';
      gameOver = false;
      status.textContent = `${current} is aan de beurt`;
    }

    function handleClick(e) {
      const cell = e.target;
      if (cell.textContent || gameOver) return;

      cell.textContent = current;
      cell.classList.add(current.toLowerCase(), 'taken');

      const winner = checkWin();
      if (winner) {
        gameOver = true;
        status.textContent = `${current} wint!`;
        winner.forEach(i => cells[i].classList.add('win'));
        score[current.toLowerCase()]++;
      } else if (cells.every(c => c.textContent)) {
        gameOver = true;
        status.textContent = 'Gelijkspel!';
        score.d++;
      } else {
        current = current === 'X' ? 'O' : 'X';
        status.textContent = `${current} is aan de beurt`;
        return;
      }
      updateScore();
    }

    function checkWin() {
      for (const combo of wins) {
        if (combo.every(i => cells[i].textContent === current)) return combo;
      }
      return null;
    }

    function updateScore() {
      xScoreEl.textContent = score.x;
      oScoreEl.textContent = score.o;
      dScoreEl.textContent = score.d;
    }

    resetBtn.addEventListener('click', init);
    init();
  </script>
</body>
</html>
